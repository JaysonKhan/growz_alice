name: alice_chopper
description: "Alice + Chopper integration. It contains plugin for Alice which allows to use Chopper package."
version: 1.0.8

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  alice:
    path: ../alice
  chopper: ^8.2.0
  http: ^1.4.0
  uuid: ^4.5.1
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0
  test: ^1.25.15
  alice_test:
    path: ../alice_test
  mocktail:
  build_runner:
  chopper_generator:
  json_serializable:
  json_annotation: ^4.9.0
  equatable: ^2.0.7
