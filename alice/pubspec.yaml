name: alice
description: Alice is an HTTP Inspector tool which helps debugging http requests. It catches and stores http requests and responses, which can be viewed via simple UI.
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^19.4.0
  rxdart: ^0.28.0
  path_provider: ^2.1.5
  permission_handler:
  package_info_plus: ">=8.3.0 <11.0.0"
#  open_filex: ^3.5.10
  sensors_plus: ^6.1.1
  share_plus: ^11.0.0
  collection:
  url_launcher:
  equatable: ^2.0.7

dev_dependencies:
  flutter_lints:
  flutter_test:
    sdk: flutter
  lints:
  test:
  mocktail: